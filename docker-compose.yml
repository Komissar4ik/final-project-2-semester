services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-social-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus_social
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus_social"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: nexus-social-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nexus_social?schema=public
      JWT_SECRET: change-me-before-public-deploy
      JWT_EXPIRES_IN: 7d
      AUTH_COOKIE_SECURE: "false"
      FRONTEND_URL: http://localhost
      GOOGLE_CLIENT_ID: demo-google-client-id
      GOOGLE_CLIENT_SECRET: demo-google-client-secret
      GOOGLE_CALLBACK_URL: http://localhost/api/auth/google/callback
      GITHUB_CLIENT_ID: demo-github-client-id
      GITHUB_CLIENT_SECRET: demo-github-client-secret
      GITHUB_CALLBACK_URL: http://localhost/api/auth/github/callback
      YANDEX_CLIENT_ID: demo-yandex-client-id
      YANDEX_CLIENT_SECRET: demo-yandex-client-secret
      YANDEX_CALLBACK_URL: http://localhost/api/auth/yandex/callback
    volumes:
      - backend-uploads:/app/uploads
    expose:
      - "3000"

  frontend:
    build:
      context: .
      args:
        VITE_API_BASE_URL: /api
    container_name: nexus-social-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres-data:
  backend-uploads:
